name: Deploy to Namecheap

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Deploy build via rsync
        env:
          HOST: ${{ vars.HOST }}
          USERNAME: ${{ vars.USERNAME }}
          PORT: ${{ vars.PORT }}
          # Folder on the server that amowogbaje.com points to.
          # On most Namecheap shared hosting this is public_html for the
          # primary domain. Override via repo/environment variable DEPLOY_PATH
          # if your account is set up differently.
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'public_html' }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/private_key
          chmod 600 /tmp/private_key
          rsync -avz --delete \
            -e "ssh -i /tmp/private_key -o StrictHostKeyChecking=no -p $PORT" \
            --exclude='.git' \
            --exclude='.env' \
            ./dist/ \
            "$USERNAME@$HOST:/home/$USERNAME/$DEPLOY_PATH/"
