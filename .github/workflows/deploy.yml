name: Deploy to Namecheap

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: NAMECHEAP
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Deploy build via rsync
        env:
          HOST: ${{ vars.HOST }}
          USERNAME: ${{ vars.USERNAME }}
          PORT: ${{ vars.PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -e

          if [ -z "$PORT" ]; then
            echo "ERROR: PORT is not set"
            exit 1
          fi

          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="public_html"
          fi

          echo "Deploying to /home/$USERNAME/$DEPLOY_PATH"

          echo "$SSH_KEY" > /tmp/private_key
          chmod 600 /tmp/private_key

          rsync -avz --delete \
            -e "ssh -i /tmp/private_key -o StrictHostKeyChecking=no -p $PORT" \
            --exclude='.git' \
            --exclude='.env' \
            ./dist/ \
            "$USERNAME@$HOST:/home/$USERNAME/$DEPLOY_PATH/"